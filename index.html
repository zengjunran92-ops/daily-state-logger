<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>状态日记</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: rgba(255, 255, 255, 0.88);
      --text: #172033;
      --muted: #7a8499;
      --line: rgba(23, 32, 51, 0.09);
      --blue: #3b82f6;
      --blue-2: #2563eb;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
      --shadow: 0 18px 45px rgba(39, 55, 88, 0.12);
      --soft-shadow: 0 10px 28px rgba(39, 55, 88, 0.08);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(34,197,94,0.14), transparent 30%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 42%, #eef2f8 100%);
    }

    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease, background 0.16s ease; }
    button:disabled { cursor: not-allowed; opacity: 0.62; transform: none !important; box-shadow: none !important; }
    .btn:active { transform: translateY(0) scale(0.98); }
    .btn:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, .tab:focus-visible {
      outline: 3px solid rgba(59,130,246,0.28);
      outline-offset: 3px;
    }

    .skip-link {
      position: fixed;
      left: 14px;
      top: 14px;
      z-index: 999;
      transform: translateY(-140%);
      border-radius: 999px;
      background: #111827;
      color: #fff;
      padding: 10px 14px;
      font-weight: 900;
      text-decoration: none;
      transition: 0.16s ease;
    }

    .skip-link:focus { transform: translateY(0); }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 22px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 18px;
      margin-bottom: 18px;
      padding: 10px 4px 4px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 46px);
      letter-spacing: -0.05em;
      line-height: 1.08;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .hero-right {
      min-width: 210px;
      text-align: right;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      display: grid;
      gap: 8px;
      justify-items: end;
    }

    .user-pill {
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      padding: 7px 11px;
      color: #344054;
    }

    .layout {
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel, .auth-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .auth-wrap {
      width: min(460px, 100%);
      margin: 12vh auto 0;
      padding: 0 18px;
    }

    .auth-card { padding: 24px; }
    .auth-card h1 { margin: 0 0 8px; font-size: 32px; letter-spacing: -0.04em; }
    .auth-card p { margin: 0 0 18px; color: var(--muted); }

    .panel-inner { padding: 20px; }
    .form-panel { position: sticky; top: 18px; }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 10px;
    }

    .section-title h2 { margin: 0; font-size: 21px; letter-spacing: -0.02em; }

    .tag {
      border-radius: 999px;
      background: #edf4ff;
      color: #2563eb;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 900;
      color: #374151;
    }

    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      outline: none;
      background: rgba(255,255,255,0.9);
      border-radius: 16px;
      padding: 12px 13px;
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    textarea { min-height: 92px; resize: vertical; line-height: 1.6; }

    .field-hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      font-weight: 700;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(59,130,246,0.72);
      box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .score-card {
      background: rgba(255,255,255,0.64);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px;
    }

    .score-card label { margin-bottom: 6px; color: var(--muted); font-size: 12px; }

    .score-card input {
      text-align: center;
      font-size: 20px;
      font-weight: 950;
      padding: 9px 6px;
      border-radius: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      border-radius: 16px;
      padding: 12px 16px;
      font-weight: 950;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 44px;
      text-decoration: none;
    }

    .btn-primary {
      flex: 1;
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--blue-2));
      box-shadow: 0 10px 22px rgba(37,99,235,0.23);
    }

    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); }

    .btn-light {
      color: #2d3a52;
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
    }

    .btn-danger { color: #b91c1c; background: #fee2e2; }
    .btn-green { color: #166534; background: #dcfce7; }

    .tools {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 14px 20px 20px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,0.38);
    }

    .tools .btn { padding: 10px 8px; min-height: 40px; font-size: 13px; border-radius: 14px; }
    #csvInput { display: none; }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 14px;
      background: rgba(255,255,255,0.45);
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }

    .tab {
      flex: 1;
      border-radius: 16px;
      padding: 11px;
      color: var(--muted);
      background: transparent;
      font-weight: 950;
    }

    .tab.active {
      background: #fff;
      color: var(--blue-2);
      box-shadow: var(--soft-shadow);
    }

    .content { padding: 20px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      box-shadow: var(--soft-shadow);
    }

    .stat-num { font-size: 26px; font-weight: 950; line-height: 1; }
    .stat-name { margin-top: 6px; color: var(--muted); font-size: 12px; font-weight: 900; }

    .filters, .chart-controls, .stage-manager-row {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr 0.9fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .chart-controls {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .records { display: grid; gap: 12px; }

    .record, .insight-card, .stage-card {
      background: rgba(255,255,255,0.82);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--soft-shadow);
    }

    .record-head, .stage-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .date { font-size: 18px; font-weight: 950; letter-spacing: -0.02em; }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: flex-end;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      background: #f1f5f9;
      color: #475569;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
    }

    .stage-badge { background: #dbeafe; color: #1d4ed8; }
    .good { background: #dcfce7; color: #166534; }
    .mid { background: #fef3c7; color: #92400e; }
    .low { background: #fee2e2; color: #991b1b; }

    .record-text, .insight-text {
      margin: 8px 0 0;
      white-space: pre-wrap;
      color: #344054;
      font-size: 14px;
    }

    .record-text strong { color: #111827; }

    .record-actions, .stage-actions { display: flex; gap: 8px; margin-top: 13px; flex-wrap: wrap; }
    .record-actions .btn, .stage-actions .btn { min-height: 34px; padding: 8px 11px; border-radius: 12px; font-size: 13px; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 42px 16px;
      background: rgba(255,255,255,0.56);
      border: 1px dashed rgba(23,32,51,0.18);
      border-radius: 22px;
      font-weight: 800;
    }

    .chart-card {
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--soft-shadow);
    }

    .chart-card h3 { margin: 0 0 10px; font-size: 18px; }
    canvas { width: 100%; height: 320px; display: block; }

    .stage-list { display: grid; gap: 10px; margin-top: 16px; }

    .stage-row {
      display: grid;
      grid-template-columns: 84px 1fr 54px;
      gap: 10px;
      align-items: center;
      color: #344054;
      font-size: 13px;
      font-weight: 900;
    }

    .bar { height: 10px; background: #e8edf5; border-radius: 999px; overflow: hidden; }
    .bar span { display: block; height: 100%; width: 0; background: linear-gradient(90deg, #93c5fd, #2563eb); border-radius: 999px; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      color: #fff;
      background: rgba(17,24,39,0.92);
      border-radius: 999px;
      padding: 11px 15px;
      font-weight: 900;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: 0.2s ease;
      z-index: 100;
      max-width: 90vw;
      text-align: center;
    }

    .toast.show { opacity: 1; bottom: 34px; }
    .hidden { display: none !important; }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 900px) {
      .app { padding: 14px; }
      .hero { align-items: flex-start; flex-direction: column; }
      .hero-right { text-align: left; justify-items: start; }
      .layout { grid-template-columns: 1fr; }
      .form-panel { position: static; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .filters, .chart-controls, .stage-manager-row { grid-template-columns: 1fr; }
      .tools { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 520px) {
      .panel-inner, .content { padding: 16px; }
      .score-grid { grid-template-columns: 1fr; }
      .record-head, .stage-head { flex-direction: column; }
      .badges { justify-content: flex-start; }
      .topbar { position: sticky; top: 0; z-index: 10; backdrop-filter: blur(14px); overflow-x: auto; }
      .tab { min-width: 74px; }
      .tools { grid-template-columns: 1fr; }
      .stage-row { grid-template-columns: 76px 1fr 44px; }
    }

    /* ===== UI Styling Skill pass: visual polish without changing core features ===== */
    :root {
      --surface: rgba(255, 255, 255, 0.78);
      --surface-strong: rgba(255, 255, 255, 0.94);
      --surface-soft: rgba(255, 255, 255, 0.56);
      --ring: rgba(37, 99, 235, 0.16);
      --brand-weak: #eff6ff;
      --brand-mid: #dbeafe;
      --ink-2: #243047;
      --ink-3: #475569;
      --danger-weak: #fff1f2;
      --success-weak: #ecfdf5;
      --warning-weak: #fffbeb;
    }

    ::selection { background: rgba(59,130,246,0.22); }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0)),
        radial-gradient(circle at 18% 18%, rgba(37, 99, 235, 0.12), transparent 28%),
        radial-gradient(circle at 78% 8%, rgba(20, 184, 166, 0.10), transparent 24%);
      z-index: -1;
    }

    .app { padding-top: 18px; }

    .hero {
      position: relative;
      padding: 22px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.86), rgba(255,255,255,0.54)),
        radial-gradient(circle at top right, rgba(59,130,246,0.14), transparent 34%);
      box-shadow: var(--soft-shadow);
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: 22px;
      top: 20px;
      width: 92px;
      height: 92px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(37,99,235,0.16), rgba(34,197,94,0.11));
      filter: blur(6px);
      z-index: 0;
    }

    .hero > * { position: relative; z-index: 1; }

    .hero-kicker, .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--blue-2);
      font-size: 12px;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero-kicker::before, .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--blue), var(--green));
      box-shadow: 0 0 0 5px rgba(59,130,246,0.10);
    }

    .hero h1 { color: #0f172a; }

    .hero-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .hero-chips span {
      border: 1px solid rgba(37, 99, 235, 0.12);
      background: rgba(239,246,255,0.82);
      color: #1d4ed8;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .hero-right {
      padding: 12px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.86);
      background: rgba(255,255,255,0.54);
      box-shadow: 0 8px 20px rgba(39,55,88,0.06);
    }

    #todayText::before {
      content: "今日  ";
      color: #94a3b8;
      font-weight: 950;
    }

    .panel, .auth-card {
      position: relative;
      background: linear-gradient(180deg, var(--surface-strong), var(--surface));
      border-color: rgba(255,255,255,0.9);
    }

    .panel::before, .auth-card::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--blue), #14b8a6, var(--green));
      opacity: 0.82;
    }

    .panel-inner, .content { padding: 22px; }

    .section-title { margin-bottom: 10px; }

    .form-note {
      margin-bottom: 18px;
      padding: 12px 13px;
      border-radius: 18px;
      border: 1px solid rgba(37,99,235,0.12);
      background: linear-gradient(135deg, rgba(239,246,255,0.88), rgba(240,253,250,0.72));
      color: #475569;
      font-size: 13px;
      font-weight: 750;
      line-height: 1.58;
    }

    .mini-section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 16px 0 10px;
      color: #1e293b;
      font-size: 13px;
      font-weight: 950;
    }

    .mini-section-title::before {
      content: "";
      width: 4px;
      height: 15px;
      border-radius: 999px;
      background: var(--blue);
    }

    label { color: #1f2937; }

    input, select, textarea {
      background: rgba(255,255,255,0.94);
      border-color: rgba(15, 23, 42, 0.10);
    }

    input:hover, select:hover, textarea:hover { border-color: rgba(37, 99, 235, 0.28); }

    input::placeholder, textarea::placeholder { color: #9aa6b6; }

    .score-card {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(248,250,252,0.86));
      border-color: rgba(37,99,235,0.10);
      box-shadow: 0 8px 18px rgba(39,55,88,0.05);
    }

    .score-card:focus-within {
      border-color: rgba(37,99,235,0.38);
      box-shadow: 0 0 0 4px var(--ring), 0 12px 24px rgba(37,99,235,0.08);
    }

    .btn { letter-spacing: -0.01em; }

    .btn-light:hover:not(:disabled) {
      background: #fff;
      box-shadow: 0 8px 18px rgba(39,55,88,0.08);
      transform: translateY(-1px);
    }

    .btn-danger {
      background: var(--danger-weak);
      border: 1px solid rgba(239,68,68,0.14);
    }

    .btn-green {
      background: var(--success-weak);
      border: 1px solid rgba(34,197,94,0.14);
    }

    .tools {
      background: linear-gradient(180deg, rgba(255,255,255,0.42), rgba(248,250,252,0.62));
    }

    .content-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 16px;
    }

    .content-head h2 {
      margin: 0;
      color: #0f172a;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .content-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.5;
      max-width: 320px;
      text-align: right;
    }

    .topbar {
      gap: 8px;
      padding: 12px;
      background: rgba(248,250,252,0.72);
    }

    .tab {
      min-height: 44px;
      border: 1px solid transparent;
      color: #64748b;
    }

    .tab:hover { background: rgba(255,255,255,0.62); }

    .tab.active {
      border-color: rgba(37,99,235,0.14);
      box-shadow: 0 12px 24px rgba(37,99,235,0.10);
    }

    .stats { gap: 10px; }

    .stat {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(248,250,252,0.88));
    }

    .stat::after {
      content: "";
      position: absolute;
      right: -18px;
      top: -18px;
      width: 58px;
      height: 58px;
      border-radius: 999px;
      background: rgba(59,130,246,0.08);
    }

    .stat-num { color: #0f172a; }
    .stat-name { color: #64748b; }

    .filters, .chart-controls, .stage-manager-row {
      padding: 12px;
      border-radius: 20px;
      border: 1px solid rgba(15,23,42,0.07);
      background: rgba(248,250,252,0.72);
    }

    .record, .insight-card, .stage-card, .chart-card {
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .record:hover, .insight-card:hover, .stage-card:hover {
      transform: translateY(-1px);
      border-color: rgba(37,99,235,0.16);
      box-shadow: 0 14px 30px rgba(39,55,88,0.09);
    }

    .record-text, .insight-text {
      line-height: 1.72;
      color: #334155;
    }

    .record-text strong {
      display: inline-flex;
      margin-right: 2px;
      color: #0f172a;
    }

    .badge { border: 1px solid rgba(15,23,42,0.06); }
    .stage-badge { background: var(--brand-mid); }
    .good { background: var(--success-weak); }
    .mid { background: var(--warning-weak); }
    .low { background: var(--danger-weak); }

    .empty {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.72), rgba(248,250,252,0.72));
      border-style: solid;
    }

    .empty::before {
      content: "";
      display: block;
      width: 36px;
      height: 36px;
      margin: 0 auto 12px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(59,130,246,0.18), rgba(34,197,94,0.14));
      box-shadow: inset 0 0 0 1px rgba(37,99,235,0.12);
    }

    .chart-card h3 {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chart-card h3::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--blue);
    }

    .bar { background: #e2e8f0; }
    .bar span { background: linear-gradient(90deg, #60a5fa, #2563eb); }

    @media (max-width: 900px) {
      .hero { padding: 18px; }
      .content-head { align-items: flex-start; flex-direction: column; }
      .content-head p { text-align: left; max-width: none; }
    }

    @media (max-width: 520px) {
      .hero { border-radius: 24px; }
      .hero-chips { gap: 6px; }
      .hero-chips span { font-size: 11px; padding: 5px 9px; }
      .panel-inner, .content { padding: 15px; }
      .filters, .chart-controls, .stage-manager-row { padding: 10px; }
      .record, .insight-card, .stage-card { padding: 14px; }
      .content-head h2 { font-size: 20px; }
    }

  </style>
</head>
<body>
  <a class="skip-link" href="#mainView">跳到主内容</a>
  <section id="authView" class="auth-wrap hidden">
    <div class="auth-card">
      <h1>状态日记</h1>
      <p>登录后，手机和电脑会同步同一份记录。</p>
      <div class="field">
        <label for="authEmail">邮箱</label>
        <input id="authEmail" type="email" placeholder="输入邮箱" autocomplete="email" />
      </div>
      <div class="field">
        <label for="authPassword">密码</label>
        <input id="authPassword" type="password" placeholder="至少 6 位" autocomplete="current-password" />
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="authSignInButton" onclick="signIn()">登录</button>
        <button class="btn btn-light" id="authSignUpButton" onclick="signUp()">注册</button>
      </div>
    </div>
  </section>

  <main id="mainView" class="app hidden">
    <header class="hero">
      <div>
        <div class="hero-kicker">Personal State OS</div>
        <h1>状态日记</h1>
        <p>每日记录状态阶段、动力、脑力和复盘。</p>
        <div class="hero-chips" aria-label="核心功能">
          <span>云端同步</span>
          <span>阶段追踪</span>
          <span>趋势复盘</span>
        </div>
      </div>
      <div class="hero-right">
        <div id="todayText"></div>
        <div class="user-pill" id="userEmail"></div>
        <button class="btn btn-light" id="signOutButton" style="min-height:34px; padding:7px 12px; border-radius:999px;" onclick="signOut()">退出登录</button>
      </div>
    </header>

    <div class="layout">
      <section class="panel form-panel">
        <div class="panel-inner">
          <div class="section-title">
            <h2 id="formTitle">记录今天</h2>
            <span class="tag" id="modeTag">新增</span>
          </div>
          <div class="form-note">先选阶段，再填三项分数，最后用简记和感悟留下复盘线索。原有保存、编辑、同步逻辑保持不变。</div>

          <form id="recordForm">
            <div class="field">
              <label for="date">日期</label>
              <input id="date" type="date" required />
            </div>

            <div class="field">
              <label for="stage">阶段</label>
              <select id="stage" required></select>
            </div>

            <div class="mini-section-title">状态评分</div>
            <div class="score-grid">
              <div class="score-card">
                <label for="outerScore">外状态</label>
                <input id="outerScore" type="number" min="0" max="100" step="1" inputmode="numeric" placeholder="0" required />
              </div>
              <div class="score-card">
                <label for="innerScore">内状态</label>
                <input id="innerScore" type="number" min="0" max="100" step="1" inputmode="numeric" placeholder="0" required />
              </div>
              <div class="score-card">
                <label for="finalScore">最终评分</label>
                <input id="finalScore" type="number" min="0" max="100" step="1" inputmode="numeric" placeholder="0" required />
              </div>
            </div>

            <div class="field-hint">分数范围 0-100；60 可视为阶段合格线，后续趋势图会自动排除三项全为 0 的占位记录。</div>

            <div class="mini-section-title">复盘文字</div>
            <div class="field" style="margin-top: 14px;">
              <label for="summary">今日简记</label>
              <textarea id="summary" placeholder="今天的大致事件、不足、睡眠、学习情况等。"></textarea>
            </div>

            <div class="field">
              <label for="insight">今日感悟</label>
              <textarea id="insight" placeholder="可选，有感悟就写。"></textarea>
            </div>

            <div class="actions">
              <button class="btn btn-primary" type="submit" id="saveBtn">保存记录</button>
              <button class="btn btn-light" type="button" onclick="resetForm()">取消</button>
            </div>
          </form>
        </div>

        <div class="tools">
          <button class="btn btn-light" onclick="exportCSV()">导出 CSV</button>
          <label class="btn btn-light" for="csvInput">导入 CSV</label>
          <input id="csvInput" type="file" accept=".csv,text/csv" onchange="importCSV(event)" />
          <button class="btn btn-danger" onclick="clearAllData()">清空数据</button>
        </div>
      </section>

      <section class="panel">
        <div class="topbar" role="tablist" aria-label="状态日记视图切换">
          <button class="tab active" data-tab="records" role="tab" aria-selected="true" onclick="switchTab('records')">记录</button>
          <button class="tab" data-tab="chart" role="tab" aria-selected="false" onclick="switchTab('chart')">趋势</button>
          <button class="tab" data-tab="insights" role="tab" aria-selected="false" onclick="switchTab('insights')">感悟</button>
          <button class="tab" data-tab="stages" role="tab" aria-selected="false" onclick="switchTab('stages')">阶段</button>
        </div>

        <div class="content">
          <div class="content-head">
            <div>
              <div class="eyebrow">Dashboard</div>
              <h2>状态总览</h2>
            </div>
            <p>在这里查看记录、趋势、感悟和阶段设置。</p>
          </div>
          <div class="stats" id="stats"></div>

          <div id="recordsPanel">
            <div class="filters">
              <input id="searchInput" type="search" placeholder="搜索简记 / 感悟" oninput="render()" />
              <select id="stageFilter" onchange="render()"></select>
              <select id="sortOrder" onchange="render()">
                <option value="desc">新到旧</option>
                <option value="asc">旧到新</option>
              </select>
            </div>
            <div class="records" id="records"></div>
          </div>

          <div id="chartPanel" style="display:none;">
            <div class="chart-controls">
              <select id="chartRange" onchange="onChartRangeChange()">
                <option value="30">最近 30 天</option>
                <option value="90" selected>最近 90 天</option>
                <option value="180">最近 180 天</option>
                <option value="365">最近 1 年</option>
                <option value="all">全部</option>
                <option value="custom">自定义区间</option>
              </select>
              <input id="chartStart" type="date" onchange="render()" disabled />
              <input id="chartEnd" type="date" onchange="render()" disabled />
            </div>
            <div class="chart-card">
              <h3>分数趋势</h3>
              <canvas id="scoreChart" width="900" height="340"></canvas>
            </div>
            <div class="chart-card" style="margin-top: 14px;">
              <h3>阶段分布</h3>
              <div class="stage-list" id="stageList"></div>
            </div>
          </div>

          <div id="insightsPanel" style="display:none;">
            <div class="filters" style="grid-template-columns: 1fr 0.8fr;">
              <input id="insightSearch" type="search" placeholder="搜索感悟" oninput="render()" />
              <select id="insightSort" onchange="render()">
                <option value="desc">新到旧</option>
                <option value="asc">旧到新</option>
              </select>
            </div>
            <div class="records" id="insights"></div>
          </div>

          <div id="stagesPanel" style="display:none;">
            <div class="stage-manager-row">
              <input id="newStageName" type="text" maxlength="20" placeholder="新增阶段，例如：平台期" />
              <button class="btn btn-primary" onclick="addStage()">新增阶段</button>
              <button class="btn btn-light" onclick="resetDefaultStages()">补回默认阶段</button>
            </div>
            <div class="records" id="stageManager"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const SUPABASE_URL = "https://xzzyndryhfdubbrozrfd.supabase.co";
    const SUPABASE_KEY = "sb_publishable_rZ8DgfiRpYH5ZqLwghO7Bg_aMHk-KvX";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const DEFAULT_STAGES = ["平稳期", "上升期", "稳定期", "高位期", "巅峰期", "失衡期", "崩溃期", "修复期"];
    const CHART_MIN_SCORE = 30;
    const CHART_MAX_SCORE = 100;

    let records = [];
    let stageOptions = [];
    let editingDate = null;
    let activeTab = "records";
    let currentUser = null;

    const $ = (id) => document.getElementById(id);

    function setButtonBusy(buttonOrId, busy, busyText = "处理中...") {
      const btn = typeof buttonOrId === "string" ? $(buttonOrId) : buttonOrId;
      if (!btn) return;
      if (busy) {
        btn.dataset.originalText = btn.textContent;
        btn.dataset.busyText = busyText;
        btn.disabled = true;
        btn.setAttribute("aria-busy", "true");
        btn.textContent = busyText;
      } else {
        btn.disabled = false;
        btn.removeAttribute("aria-busy");
        if (btn.textContent === btn.dataset.busyText && btn.dataset.originalText) {
          btn.textContent = btn.dataset.originalText;
        }
        delete btn.dataset.originalText;
        delete btn.dataset.busyText;
      }
    }

    function todayString() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1900);
    }

    function showAuthView() {
      $("authView").classList.remove("hidden");
      $("mainView").classList.add("hidden");
    }

    function showMainView() {
      $("authView").classList.add("hidden");
      $("mainView").classList.remove("hidden");
      $("userEmail").textContent = currentUser?.email || "已登录";
    }

    async function initAuth() {
      const { data } = await supabaseClient.auth.getSession();
      currentUser = data.session?.user || null;
      if (currentUser) {
        showMainView();
        await loadAllCloudData();
      } else {
        showAuthView();
      }

      supabaseClient.auth.onAuthStateChange(async (_event, session) => {
        currentUser = session?.user || null;
        if (currentUser) {
          showMainView();
          await loadAllCloudData();
        } else {
          records = [];
          stageOptions = [];
          render();
          showAuthView();
        }
      });
    }

    async function signUp() {
      const email = $("authEmail").value.trim();
      const password = $("authPassword").value;
      if (!email || !password) return showToast("请输入邮箱和密码");
      if (password.length < 6) return showToast("密码至少 6 位");

      setButtonBusy("authSignUpButton", true, "注册中...");
      try {
        const { error } = await supabaseClient.auth.signUp({
          email,
          password,
          options: { emailRedirectTo: window.location.href }
        });
        if (error) return showToast(error.message);
        showToast("注册成功。若需要验证邮箱，请先去邮箱点击确认链接");
      } finally {
        setButtonBusy("authSignUpButton", false);
      }
    }

    async function signIn() {
      const email = $("authEmail").value.trim();
      const password = $("authPassword").value;
      if (!email || !password) return showToast("请输入邮箱和密码");

      setButtonBusy("authSignInButton", true, "登录中...");
      try {
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) return showToast(error.message);
        showToast("已登录");
      } finally {
        setButtonBusy("authSignInButton", false);
      }
    }

    async function signOut() {
      setButtonBusy("signOutButton", true, "退出中...");
      try {
        const { error } = await supabaseClient.auth.signOut();
        if (error) return showToast("退出失败：" + error.message);
        showToast("已退出");
      } finally {
        setButtonBusy("signOutButton", false);
      }
    }

    function toScore(value) {
      const n = Number(value);
      if (Number.isNaN(n)) return 0;
      return Math.max(0, Math.min(100, Math.round(n)));
    }

    function normalizeDate(raw) {
      const s = String(raw || "").trim().replace(/[./]/g, "-");
      if (/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)) {
        const [y, m, d] = s.split("-");
        return `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
      }
      if (/^\d{8}$/.test(s)) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
      if (/^\d{4}$/.test(s)) return `${new Date().getFullYear()}-${s.slice(0,2)}-${s.slice(2,4)}`;
      return s;
    }

    function isZeroScoreRecord(record) {
      return Number(record.outerScore) === 0 && Number(record.innerScore) === 0 && Number(record.finalScore) === 0;
    }

    function activeStageNames() {
      const names = stageOptions.map(s => s.name);
      return names.length ? names : DEFAULT_STAGES;
    }

    function allStageNamesForDisplay() {
      const names = new Set(activeStageNames());
      records.forEach(r => { if (r.stage) names.add(r.stage); });
      return Array.from(names);
    }

    function normalizeRecord(record) {
      const fallbackStage = activeStageNames()[0] || "平稳期";
      return {
        date: normalizeDate(record.date),
        stage: String(record.stage || fallbackStage).trim() || fallbackStage,
        outerScore: toScore(record.outerScore),
        innerScore: toScore(record.innerScore),
        finalScore: toScore(record.finalScore),
        summary: String(record.summary || ""),
        insight: String(record.insight || "")
      };
    }

    function fromDb(row) {
      return normalizeRecord({
        date: row.date,
        stage: row.stage,
        outerScore: row.outer_score,
        innerScore: row.inner_score,
        finalScore: row.final_score,
        summary: row.summary,
        insight: row.insight
      });
    }

    function toDb(record) {
      return {
        user_id: currentUser.id,
        date: record.date,
        stage: record.stage,
        outer_score: record.outerScore,
        inner_score: record.innerScore,
        final_score: record.finalScore,
        summary: record.summary,
        insight: record.insight
      };
    }

    async function loadAllCloudData() {
      if (!currentUser) return;
      await loadStages();
      await loadCloudRecords(false);
      resetForm();
      render();
      showToast("已同步");
    }

    async function loadStages() {
      if (!currentUser) return;
      const { data, error } = await supabaseClient
        .from("user_stages")
        .select("id,name,sort_order")
        .order("sort_order", { ascending: true })
        .order("created_at", { ascending: true });

      if (error) {
        showToast("读取阶段失败：" + error.message);
        stageOptions = DEFAULT_STAGES.map((name, index) => ({ id: null, name, sort_order: index }));
        return;
      }

      stageOptions = data || [];
      if (stageOptions.length === 0) {
        await seedDefaultStages(false);
        const { data: seeded } = await supabaseClient
          .from("user_stages")
          .select("id,name,sort_order")
          .order("sort_order", { ascending: true });
        stageOptions = seeded || [];
      }
    }

    async function seedDefaultStages(showMessage = true) {
      if (!currentUser) return;
      const rows = DEFAULT_STAGES.map((name, index) => ({
        user_id: currentUser.id,
        name,
        sort_order: index
      }));
      const { error } = await supabaseClient
        .from("user_stages")
        .upsert(rows, { onConflict: "user_id,name" });
      if (error) return showToast("补回默认阶段失败：" + error.message);
      if (showMessage) showToast("默认阶段已补回");
    }

    async function loadCloudRecords(showMessage = true) {
      if (!currentUser) return;
      const { data, error } = await supabaseClient
        .from("state_records")
        .select("date,stage,outer_score,inner_score,final_score,summary,insight")
        .order("date", { ascending: true });

      if (error) {
        showToast("读取云端失败：" + error.message);
        return;
      }
      records = (data || []).map(fromDb);
      render();
      if (showMessage) showToast("已同步");
    }

    function resetForm() {
      editingDate = null;
      $("formTitle").textContent = "记录今天";
      $("modeTag").textContent = "新增";
      $("saveBtn").textContent = "保存记录";
      $("date").value = todayString();
      renderStageControls();
      $("stage").value = activeStageNames()[0] || "平稳期";
      $("outerScore").value = "";
      $("innerScore").value = "";
      $("finalScore").value = "";
      $("summary").value = "";
      $("insight").value = "";
    }

    function getFormData() {
      return normalizeRecord({
        date: $("date").value,
        stage: $("stage").value,
        outerScore: $("outerScore").value,
        innerScore: $("innerScore").value,
        finalScore: $("finalScore").value,
        summary: $("summary").value.trim(),
        insight: $("insight").value.trim()
      });
    }

    $("recordForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!currentUser) return showToast("请先登录");
      const record = getFormData();
      if (!record.date) return showToast("请填写日期");

      setButtonBusy("saveBtn", true, editingDate ? "修改中..." : "保存中...");
      try {
        await ensureStagesExist([record.stage]);

        if (editingDate && editingDate !== record.date) {
          const { error: deleteError } = await supabaseClient
            .from("state_records")
            .delete()
            .eq("user_id", currentUser.id)
            .eq("date", editingDate);
          if (deleteError) return showToast("修改日期失败：" + deleteError.message);
        }

        const { error } = await supabaseClient
          .from("state_records")
          .upsert(toDb(record), { onConflict: "user_id,date" });

        if (error) return showToast("保存失败：" + error.message);
        await loadStages();
        await loadCloudRecords(false);
        resetForm();
        showToast("已保存并自动同步");
      } finally {
        setButtonBusy("saveBtn", false);
      }
    });

    function editRecord(date) {
      const r = records.find(item => item.date === date);
      if (!r) return;
      editingDate = date;
      ensureStageOptionVisible(r.stage);
      renderStageControls(r.stage);
      $("formTitle").textContent = "编辑记录";
      $("modeTag").textContent = r.date;
      $("saveBtn").textContent = "保存修改";
      $("date").value = r.date;
      $("stage").value = r.stage;
      $("outerScore").value = r.outerScore;
      $("innerScore").value = r.innerScore;
      $("finalScore").value = r.finalScore;
      $("summary").value = r.summary;
      $("insight").value = r.insight;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function ensureStageOptionVisible(stageName) {
      if (!stageName) return;
      const exists = Array.from($("stage").options).some(option => option.value === stageName);
      if (!exists) {
        const option = document.createElement("option");
        option.value = stageName;
        option.textContent = `${stageName}（历史）`;
        $("stage").appendChild(option);
      }
    }

    async function deleteRecord(date) {
      if (!confirm(`删除 ${date} 的记录？`)) return;
      const { error } = await supabaseClient
        .from("state_records")
        .delete()
        .eq("user_id", currentUser.id)
        .eq("date", date);
      if (error) return showToast("删除失败：" + error.message);
      await loadCloudRecords(false);
      showToast("已删除并自动同步");
    }

    async function clearAllData() {
      if (!currentUser) return showToast("请先登录");
      if (!records.length) return showToast("当前没有记录");
      if (!confirm("确定清空所有状态记录？阶段设置不会被删除。")) return;
      const { error } = await supabaseClient
        .from("state_records")
        .delete()
        .eq("user_id", currentUser.id);
      if (error) return showToast("清空失败：" + error.message);
      await loadCloudRecords(false);
      resetForm();
      showToast("记录已清空");
    }

    async function addStage() {
      if (!currentUser) return showToast("请先登录");
      const name = $("newStageName").value.trim();
      if (!name) return showToast("请输入阶段名称");
      if (name.length > 20) return showToast("阶段名称不要超过 20 个字");
      if (activeStageNames().includes(name)) return showToast("这个阶段已经存在");

      const maxOrder = stageOptions.reduce((max, s) => Math.max(max, Number(s.sort_order || 0)), -1);
      const { error } = await supabaseClient
        .from("user_stages")
        .insert({ user_id: currentUser.id, name, sort_order: maxOrder + 1 });
      if (error) return showToast("新增阶段失败：" + error.message);
      $("newStageName").value = "";
      await loadStages();
      render();
      showToast("阶段已新增");
    }

    async function deleteStage(stageId, stageName) {
      if (!currentUser) return showToast("请先登录");
      if (stageOptions.length <= 1) return showToast("至少保留一个阶段");
      if (!confirm(`删除阶段「${stageName}」？历史记录不会被删除。`)) return;
      const { error } = await supabaseClient
        .from("user_stages")
        .delete()
        .eq("user_id", currentUser.id)
        .eq("id", stageId);
      if (error) return showToast("删除阶段失败：" + error.message);
      await loadStages();
      render();
      showToast("阶段已删除");
    }

    async function resetDefaultStages() {
      await seedDefaultStages(true);
      await loadStages();
      render();
    }

    async function ensureStagesExist(names) {
      if (!currentUser) return;
      const existing = new Set(activeStageNames());
      const missing = Array.from(new Set(names.map(n => String(n || "").trim()).filter(Boolean)))
        .filter(name => !existing.has(name));
      if (!missing.length) return;
      const maxOrder = stageOptions.reduce((max, s) => Math.max(max, Number(s.sort_order || 0)), -1);
      const rows = missing.map((name, index) => ({
        user_id: currentUser.id,
        name,
        sort_order: maxOrder + index + 1
      }));
      const { error } = await supabaseClient
        .from("user_stages")
        .upsert(rows, { onConflict: "user_id,name" });
      if (!error) await loadStages();
    }

    function escapeHTML(text) {
      return String(text).replace(/[&<>\"]/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;"
      }[ch]));
    }

    function scoreClass(score) {
      if (score >= 75) return "good";
      if (score >= 60) return "mid";
      return "low";
    }

    function average(list, key) {
      if (!list.length) return 0;
      return Math.round(list.reduce((sum, item) => sum + Number(item[key] || 0), 0) / list.length);
    }

    function filteredRecords() {
      const keyword = $("searchInput").value.trim().toLowerCase();
      const stageFilter = $("stageFilter").value;
      const sort = $("sortOrder").value;
      return records
        .filter(r => {
          const text = `${r.summary} ${r.insight} ${r.stage}`.toLowerCase();
          return (stageFilter === "全部" || r.stage === stageFilter) && (!keyword || text.includes(keyword));
        })
        .sort((a, b) => sort === "asc" ? a.date.localeCompare(b.date) : b.date.localeCompare(a.date));
    }

    function getChartDateRange() {
      const value = $("chartRange").value;
      if (value === "all") return { start: null, end: null };
      if (value === "custom") {
        return {
          start: $("chartStart").value || null,
          end: $("chartEnd").value || null
        };
      }
      const days = Number(value);
      const end = todayString();
      const startDate = new Date();
      startDate.setDate(startDate.getDate() - days + 1);
      const y = startDate.getFullYear();
      const m = String(startDate.getMonth() + 1).padStart(2, "0");
      const d = String(startDate.getDate()).padStart(2, "0");
      return { start: `${y}-${m}-${d}`, end };
    }

    function inDateRange(record, range) {
      return (!range.start || record.date >= range.start) && (!range.end || record.date <= range.end);
    }

    function chartRecords() {
      const range = getChartDateRange();
      return records
        .filter(r => !isZeroScoreRecord(r))
        .filter(r => inDateRange(r, range))
        .sort((a, b) => a.date.localeCompare(b.date));
    }

    function onChartRangeChange() {
      const custom = $("chartRange").value === "custom";
      $("chartStart").disabled = !custom;
      $("chartEnd").disabled = !custom;
      render();
    }

    function renderStageControls(selectedStage = null) {
      const stageNames = activeStageNames();
      const currentStage = selectedStage || $("stage")?.value || stageNames[0] || "平稳期";
      $("stage").innerHTML = stageNames
        .map(name => `<option value="${escapeHTML(name)}">${escapeHTML(name)}</option>`)
        .join("");
      ensureStageOptionVisible(currentStage);
      $("stage").value = currentStage;

      const currentFilter = $("stageFilter")?.value || "全部";
      const filterNames = allStageNamesForDisplay();
      $("stageFilter").innerHTML = `<option value="全部">全部阶段</option>` + filterNames
        .map(name => `<option value="${escapeHTML(name)}">${escapeHTML(name)}</option>`)
        .join("");
      $("stageFilter").value = filterNames.includes(currentFilter) ? currentFilter : "全部";
    }

    function renderStats() {
      const list = filteredRecords();
      const scoredList = list.filter(r => !isZeroScoreRecord(r));
      const latest = records.length ? records[records.length - 1] : null;
      $("stats").innerHTML = `
        <div class="stat"><div class="stat-num">${list.length}</div><div class="stat-name">记录天数</div></div>
        <div class="stat"><div class="stat-num">${average(scoredList, "outerScore")}</div><div class="stat-name">平均外状态</div></div>
        <div class="stat"><div class="stat-num">${average(scoredList, "innerScore")}</div><div class="stat-name">平均内状态</div></div>
        <div class="stat"><div class="stat-num">${latest ? latest.stage : "—"}</div><div class="stat-name">最新阶段</div></div>
      `;
    }

    function renderRecords() {
      const list = filteredRecords();
      if (!list.length) {
        $("records").innerHTML = `<div class="empty">暂无记录</div>`;
        return;
      }
      $("records").innerHTML = list.map(r => `
        <article class="record">
          <div class="record-head">
            <div class="date">${escapeHTML(r.date)}</div>
            <div class="badges">
              <span class="badge stage-badge">${escapeHTML(r.stage)}</span>
              <span class="badge">外 ${r.outerScore}</span>
              <span class="badge">内 ${r.innerScore}</span>
              <span class="badge ${scoreClass(r.finalScore)}">评 ${r.finalScore}</span>
            </div>
          </div>
          ${r.summary ? `<div class="record-text"><strong>简记：</strong>${escapeHTML(r.summary)}</div>` : ""}
          ${r.insight ? `<div class="record-text"><strong>感悟：</strong>${escapeHTML(r.insight)}</div>` : ""}
          ${!r.summary && !r.insight ? `<div class="record-text" style="color: var(--muted);">没有文字记录</div>` : ""}
          <div class="record-actions">
            <button class="btn btn-light" onclick="editRecord('${r.date}')">编辑</button>
            <button class="btn btn-danger" onclick="deleteRecord('${r.date}')">删除</button>
          </div>
        </article>
      `).join("");
    }

    function renderInsights() {
      const keyword = $("insightSearch")?.value.trim().toLowerCase() || "";
      const sort = $("insightSort")?.value || "desc";
      const list = records
        .filter(r => r.insight && r.insight.trim())
        .filter(r => !keyword || `${r.date} ${r.stage} ${r.insight}`.toLowerCase().includes(keyword))
        .sort((a, b) => sort === "asc" ? a.date.localeCompare(b.date) : b.date.localeCompare(a.date));

      if (!list.length) {
        $("insights").innerHTML = `<div class="empty">暂无感悟记录</div>`;
        return;
      }

      $("insights").innerHTML = list.map(r => `
        <article class="insight-card">
          <div class="record-head">
            <div class="date">${escapeHTML(r.date)}</div>
            <div class="badges">
              <span class="badge stage-badge">${escapeHTML(r.stage)}</span>
              <span class="badge ${scoreClass(r.finalScore)}">评 ${r.finalScore}</span>
            </div>
          </div>
          <div class="insight-text">${escapeHTML(r.insight)}</div>
          <div class="record-actions">
            <button class="btn btn-light" onclick="editRecord('${r.date}')">编辑这天</button>
          </div>
        </article>
      `).join("");
    }

    function renderStageManager() {
      if (!stageOptions.length) {
        $("stageManager").innerHTML = `<div class="empty">暂无阶段，请新增或补回默认阶段</div>`;
        return;
      }
      $("stageManager").innerHTML = stageOptions.map(stage => {
        const count = records.filter(r => r.stage === stage.name).length;
        return `
          <article class="stage-card">
            <div class="stage-head">
              <div>
                <div class="date">${escapeHTML(stage.name)}</div>
                <div class="record-text" style="color: var(--muted);">历史记录：${count} 天</div>
              </div>
              <div class="badges"><span class="badge">可选阶段</span></div>
            </div>
            <div class="stage-actions">
              <button class="btn btn-danger" onclick="deleteStage('${stage.id}', decodeURIComponent('${encodeURIComponent(stage.name)}'))">删除阶段</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function prepareChartCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const cssWidth = Math.max(320, Math.round(rect.width || canvas.clientWidth || 900));
      const cssHeight = Math.max(260, Math.round(rect.height || 320));
      const targetWidth = Math.round(cssWidth * dpr);
      const targetHeight = Math.round(cssHeight * dpr);
      if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
        canvas.width = targetWidth;
        canvas.height = targetHeight;
      }
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { ctx, w: cssWidth, h: cssHeight };
    }

    function drawChart() {
      const canvas = $("scoreChart");
      const { ctx, w, h } = prepareChartCanvas(canvas);
      const list = chartRecords();
      const pad = 42;

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = "#e5e7eb";
      ctx.fillStyle = "#7a8499";
      ctx.lineWidth = 1;
      ctx.font = "12px sans-serif";
      for (let y = CHART_MIN_SCORE; y <= CHART_MAX_SCORE; y += 10) {
        const py = h - pad - (y - CHART_MIN_SCORE) / (CHART_MAX_SCORE - CHART_MIN_SCORE) * (h - pad * 2);
        ctx.beginPath();
        ctx.moveTo(pad, py);
        ctx.lineTo(w - pad, py);
        ctx.stroke();
        ctx.fillText(y, 12, py + 4);
      }

      if (!list.length) {
        ctx.fillStyle = "#7a8499";
        ctx.font = "20px sans-serif";
        ctx.fillText("暂无有效趋势数据", w / 2 - 78, h / 2);
        return;
      }

      const xAt = i => list.length === 1 ? w / 2 : pad + i / (list.length - 1) * (w - pad * 2);
      const yAt = score => {
        const clamped = Math.max(CHART_MIN_SCORE, Math.min(CHART_MAX_SCORE, Number(score || 0)));
        return h - pad - (clamped - CHART_MIN_SCORE) / (CHART_MAX_SCORE - CHART_MIN_SCORE) * (h - pad * 2);
      };

      function line(key, color) {
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        list.forEach((r, i) => {
          const x = xAt(i), y = yAt(r[key]);
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
        list.forEach((r, i) => {
          ctx.beginPath();
          ctx.arc(xAt(i), yAt(r[key]), 4, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      line("outerScore", "#3b82f6");
      line("innerScore", "#22c55e");
      line("finalScore", "#f59e0b");

      const legends = [["#3b82f6", "外状态"], ["#22c55e", "内状态"], ["#f59e0b", "最终评分"]];
      legends.forEach(([color, label], i) => {
        const x = pad + i * 112;
        ctx.fillStyle = color;
        ctx.fillRect(x, 17, 18, 8);
        ctx.fillStyle = "#344054";
        ctx.font = "13px sans-serif";
        ctx.fillText(label, x + 26, 25);
      });

      const labels = pickLabels(list);
      ctx.fillStyle = "#7a8499";
      ctx.font = "11px sans-serif";
      labels.forEach(({ i, date }) => ctx.fillText(date.slice(5), xAt(i) - 14, h - 14));
    }

    function pickLabels(list) {
      if (list.length <= 6) return list.map((r, i) => ({ i, date: r.date }));
      const set = new Set([0, list.length - 1]);
      const step = Math.ceil(list.length / 5);
      for (let i = 0; i < list.length; i += step) set.add(i);
      return Array.from(set).sort((a, b) => a - b).map(i => ({ i, date: list[i].date }));
    }

    function renderStageList() {
      const validRecords = chartRecords();
      const total = validRecords.length;
      const stageNames = allStageNamesForDisplay();
      const counts = Object.fromEntries(stageNames.map(s => [s, 0]));
      validRecords.forEach(r => counts[r.stage] = (counts[r.stage] || 0) + 1);
      $("stageList").innerHTML = stageNames.map(stage => {
        const count = counts[stage] || 0;
        const pct = total ? Math.round(count / total * 100) : 0;
        return `
          <div class="stage-row">
            <span>${escapeHTML(stage)}</span>
            <div class="bar"><span style="width:${pct}%"></span></div>
            <span>${count}天</span>
          </div>
        `;
      }).join("");
    }

    function render() {
      renderStageControls();
      renderStats();
      renderRecords();
      renderInsights();
      renderStageManager();
      renderStageList();
      drawChart();
    }

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll(".tab").forEach(btn => {
        const selected = btn.dataset.tab === tab;
        btn.classList.toggle("active", selected);
        btn.setAttribute("aria-selected", selected ? "true" : "false");
      });
      $("recordsPanel").style.display = tab === "records" ? "block" : "none";
      $("chartPanel").style.display = tab === "chart" ? "block" : "none";
      $("insightsPanel").style.display = tab === "insights" ? "block" : "none";
      $("stagesPanel").style.display = tab === "stages" ? "block" : "none";
      if (tab === "chart") setTimeout(drawChart, 60);
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return /[",\n\r]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }

    function exportCSV() {
      const headers = ["日期", "阶段", "外状态打分", "内状态打分", "最终评分", "今日简记", "今日感悟"];
      const rows = records.map(r => [r.date, r.stage, r.outerScore, r.innerScore, r.finalScore, r.summary, r.insight]);
      const csv = [headers, ...rows].map(row => row.map(csvEscape).join(",")).join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `状态记录-${todayString()}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast("CSV 已导出");
    }

    function parseCSV(text) {
      const rows = [];
      let row = [], field = "", inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i + 1];
        if (ch === '"') {
          if (inQuotes && next === '"') { field += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (ch === "," && !inQuotes) {
          row.push(field); field = "";
        } else if ((ch === "\n" || ch === "\r") && !inQuotes) {
          if (ch === "\r" && next === "\n") i++;
          row.push(field);
          if (row.some(c => String(c).trim())) rows.push(row);
          row = []; field = "";
        } else field += ch;
      }
      row.push(field);
      if (row.some(c => String(c).trim())) rows.push(row);
      return rows;
    }

    async function importCSV(event) {
      if (!currentUser) return showToast("请先登录");
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async e => {
        try {
          const rows = parseCSV(String(e.target.result || "").replace(/^\ufeff/, ""));
          if (rows.length < 2) return showToast("CSV 没有可导入数据");
          const headers = rows[0].map(h => String(h).trim());
          const idx = (...names) => headers.findIndex(h => names.includes(h));
          const map = {
            date: idx("日期", "date"),
            stage: idx("阶段", "stage"),
            outerScore: idx("外状态打分", "外状态", "outerScore"),
            innerScore: idx("内状态打分", "内状态", "innerScore"),
            finalScore: idx("最终评分", "最后评分", "总评分", "finalScore"),
            summary: idx("今日简记", "备注", "简记", "summary"),
            insight: idx("今日感悟", "感悟", "insight")
          };
          if (map.date < 0) return showToast("缺少日期列");

          const normalized = rows.slice(1).map(row => normalizeRecord({
            date: row[map.date],
            stage: map.stage >= 0 ? row[map.stage] : activeStageNames()[0],
            outerScore: map.outerScore >= 0 ? row[map.outerScore] : 0,
            innerScore: map.innerScore >= 0 ? row[map.innerScore] : 0,
            finalScore: map.finalScore >= 0 ? row[map.finalScore] : 0,
            summary: map.summary >= 0 ? row[map.summary] : "",
            insight: map.insight >= 0 ? row[map.insight] : ""
          })).filter(r => r.date);

          if (!normalized.length) return showToast("没有可导入记录");
          await ensureStagesExist(normalized.map(r => r.stage));
          const imported = normalized.map(toDb);
          const { error } = await supabaseClient
            .from("state_records")
            .upsert(imported, { onConflict: "user_id,date" });
          if (error) return showToast("导入失败：" + error.message);
          await loadAllCloudData();
          showToast(`导入 ${imported.length} 条`);
        } catch {
          showToast("导入失败");
        } finally {
          event.target.value = "";
        }
      };
      reader.readAsText(file, "utf-8");
    }

    window.addEventListener("resize", () => {
      if (activeTab === "chart") drawChart();
    });

    window.addEventListener("DOMContentLoaded", async () => {
      $("todayText").textContent = todayString();
      $("chartEnd").value = todayString();
      const start = new Date();
      start.setDate(start.getDate() - 89);
      $("chartStart").value = `${start.getFullYear()}-${String(start.getMonth() + 1).padStart(2, "0")}-${String(start.getDate()).padStart(2, "0")}`;
      resetForm();
      render();
      await initAuth();
    });
  </script>
</body>
</html>
